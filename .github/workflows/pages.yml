name: Publish Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Inject
        env:
          A8811D: ${{ secrets.A8811D }}
          BB7369: ${{ secrets.BB7369 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./_site
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A8811D', '')
          meta_b = os.environ.get('BB7369', '')
          changed = 0
          for page in pathlib.Path('_site').rglob('*.html'):
              try:
                  src = page.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              out = src
              if meta_a:
                  out = out.replace('<!-- 549509fee5ea1cbd8f75e85aaa23013adeee -->', meta_a)
              if meta_b:
                  out = out.replace('<!-- e932dbe00173589f598890f7df626a -->', meta_b)
              if out != src:
                  page.write_text(out, encoding='utf-8')
                  changed += 1
          if changed == 0 and (meta_a or meta_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: pages-deploy
        uses: actions/deploy-pages@v4
